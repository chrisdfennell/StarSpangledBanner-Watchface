<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Deep night sky backdrop -->
  <rect width="48" height="48" rx="8" fill="#070B1E"/>
  <circle cx="24" cy="24" r="21" stroke="#1B2E66" stroke-width="1.5" opacity="0.8"/>

  <defs>
    <radialGradient id="burstGlow" cx="50%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#FFF3C0"/>
      <stop offset="45%" stop-color="#FFD23F" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFD23F" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Soft glow behind the burst -->
  <circle cx="24" cy="20" r="15" fill="url(#burstGlow)"/>

  <!-- Firework burst: red / white / blue rays radiating from the center -->
  <g stroke-width="1.6" stroke-linecap="round">
    <!-- red rays -->
    <g stroke="#E03A3A">
      <line x1="24" y1="20" x2="24" y2="7"/>
      <line x1="24" y1="20" x2="35" y2="13"/>
      <line x1="24" y1="20" x2="37" y2="24"/>
      <line x1="24" y1="20" x2="13" y2="13"/>
      <line x1="24" y1="20" x2="11" y2="24"/>
    </g>
    <!-- white rays (between the red) -->
    <g stroke="#F4F7FF">
      <line x1="24" y1="20" x2="31" y2="9"/>
      <line x1="24" y1="20" x2="17" y2="9"/>
      <line x1="24" y1="20" x2="33" y2="30"/>
      <line x1="24" y1="20" x2="15" y2="30"/>
    </g>
    <!-- blue rays (the trailing/lower spokes) -->
    <g stroke="#4F7BE8">
      <line x1="24" y1="20" x2="28" y2="33"/>
      <line x1="24" y1="20" x2="20" y2="33"/>
    </g>
  </g>

  <!-- spark tips -->
  <g>
    <circle cx="24" cy="7"  r="1.3" fill="#FFF3C0"/>
    <circle cx="37" cy="24" r="1.3" fill="#FFD2D2"/>
    <circle cx="11" cy="24" r="1.3" fill="#FFD2D2"/>
    <circle cx="33" cy="30" r="1.1" fill="#CFE0FF"/>
    <circle cx="15" cy="30" r="1.1" fill="#CFE0FF"/>
  </g>

  <!-- bright core -->
  <circle cx="24" cy="20" r="2.6" fill="#FFFFFF"/>
  <circle cx="24" cy="20" r="1.3" fill="#FFF3C0"/>

  <!-- Steps progress bar at the bottom (red-white-blue) -->
  <rect x="14" y="40" width="20" height="2.5" rx="1.25" fill="#10182E"/>
  <rect x="14" y="40" width="13" height="2.5" rx="1.25" fill="#E03A3A"/>
</svg>
